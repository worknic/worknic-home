<style>
  :root{
    --ink:#1A1A1A;
    --paper:#F4EFE6;
    --line:#1A1A1A;
    --sub:#888;
    --hover:#FBF8F2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'Spoqa Han Sans Neo',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;
    max-width:400px;
    opacity:0;
    animation:rise .9s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(12px);}
    to{opacity:1;transform:translateY(0);}
  }
  @media (prefers-reduced-motion:reduce){
    .card{animation:none;opacity:1;}
  }

  /* 헤더 */
  .comma{
    width:30px;
    height:auto;
    color:var(--ink);
    margin-bottom:20px;
    display:block;
  }
  .mark{
    font-size:30px;
    font-weight:700;
    letter-spacing:5px;
    margin-bottom:8px;
  }
  .tagline-top{
    font-size:10px;
    letter-spacing:2.4px;
    text-transform:uppercase;
    font-weight:400;
    color:var(--ink);
    margin-bottom:44px;
  }

  /* 채널 리스트 */
  .channels{
    list-style:none;
    margin-bottom:36px;
  }
  .channels li{
    border-top:1px solid var(--line);
  }
  .channels li:last-child{
    border-bottom:1px solid var(--line);
  }
  .channels a{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:16px 4px;
    text-decoration:none;
    color:var(--ink);
    transition:background .25s ease, padding-left .25s ease;
  }
  .channels a:hover,
  .channels a:focus-visible{
    background:var(--hover);
    padding-left:12px;
    outline:none;
  }
  .channels a:focus-visible{
    outline:1px solid var(--ink);
    outline-offset:-1px;
  }
  .ch-label{
    font-size:13px;
    font-weight:500;
    letter-spacing:1.5px;
  }
  .ch-sub{
    font-size:11px;
    font-weight:300;
    letter-spacing:.3px;
    color:var(--sub);
  }

  /* 연락 줄 */
  .contact{
    display:flex;
    gap:18px;
    margin-bottom:40px;
    font-size:11px;
    letter-spacing:1px;
  }
  .contact a{
    color:var(--ink);
    text-decoration:none;
    transition:color .25s ease;
  }
  .contact a:hover,
  .contact a:focus-visible{
    color:var(--sub);
    outline:none;
  }
  .contact .divider{
    color:#CCC;
  }

  /* 푸터 */
  .rule{
    width:24px;
    height:1px;
    background:var(--ink);
    margin-bottom:18px;
  }
  .creed{
    font-size:12px;
    letter-spacing:.3px;
    line-height:1.8;
  }
  .place{
    color:var(--sub);
    font-size:11px;
    letter-spacing:.8px;
  }
</style>
</head>
